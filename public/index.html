<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Forum</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>My Forum</h1>

  <!-- Post -->
  <div id="post"></div>

  <!-- Comments -->
  <h2>Comments</h2>
  <div id="comments"></div>

  <!-- Add comment form -->
  <h3>Add Comment</h3>
<input type="text" id="username" placeholder="Your name">
<br>
<textarea id="message" placeholder="Your comment"></textarea>
<br>
<button id="submitComment">Submit</button>
</div>

<!-- Screensaver overlay -->
<!-- Screensaver overlay (hidden by default) -->
<div id="screensaver">
    <div id="sentence-box"></div>
</div>

<script src="screensaver.js"></script>
<script src="script.js"></script>
</body>
</html>
